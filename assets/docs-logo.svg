<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="Tauri plugin keyring">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d6efd"/>
      <stop offset="100%" style="stop-color:#6f42c1"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="24" fill="url(#g)"/>
  <!-- key head -->
  <circle cx="78" cy="38" r="16" fill="#fff" opacity="0.95"/>
  <rect x="70" y="50" width="16" height="8" rx="2" fill="#fff" opacity="0.95"/>
  <!-- key shaft + teeth -->
  <rect x="70" y="58" width="8" height="48" rx="1" fill="#fff" opacity="0.95"/>
  <rect x="58" y="90" width="20" height="6" rx="1" fill="#fff" opacity="0.95"/>
  <rect x="58" y="100" width="12" height="6" rx="1" fill="#fff" opacity="0.95"/>
  <!-- small lock body hint -->
  <rect x="32" y="72" width="28" height="32" rx="4" fill="none" stroke="#fff" stroke-width="3" opacity="0.5"/>
</svg>
